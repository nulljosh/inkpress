<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    .bg { fill: #fafafa; }
    .fg { fill: #000; }
    .mut { fill: rgba(0,0,0,0.5); }
    .dim { fill: rgba(0,0,0,0.25); }
    .brd { stroke: rgba(0,0,0,0.1); }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #111; }
      .fg { fill: #e8e8e8; }
      .mut { fill: rgba(255,255,255,0.5); }
      .dim { fill: rgba(255,255,255,0.25); }
      .brd { stroke: rgba(255,255,255,0.1); }
    }
    .t { font-family: Geist, -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }
    .m { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace; }
  </style>
  <rect class="bg" width="800" height="500"/>
  <rect class="brd" x="20" y="20" width="760" height="460" rx="12" ry="12" fill="none" stroke-width="1"/>

  <text class="t fg" x="48" y="90" font-size="42" font-weight="300" letter-spacing="-1">Ship, Rename, Repeat</text>
  <text class="t mut" x="48" y="126" font-size="16">renames, App Review blitz, Cloudflare migration, wiki fix</text>

  <line class="brd" x1="48" y1="152" x2="752" y2="152" stroke-width="1"/>

  <text class="m fg" x="48" y="188" font-size="14">litigate, sparkjar, spine, etyma</text>
  <text class="m fg" x="48" y="210" font-size="14">lexly, healstack, inkpress, echo</text>
  <text class="m mut" x="48" y="236" font-size="14">(July 11-21, 20+ repos touched)</text>

  <rect class="brd" x="560" y="176" width="200" height="280" rx="8" ry="8" fill="none" stroke-width="1"/>
  <text class="m mut" x="584" y="206" font-size="12">highlights</text>
  <text class="m fg" x="584" y="232" font-size="28" font-weight="500">12</text>
  <text class="m mut" x="584" y="268" font-size="12">apps on Cloudflare</text>
  <text class="m fg" x="584" y="292" font-size="14">4 renames closed</text>
  <text class="m fg" x="584" y="314" font-size="14">wiki index fixed</text>
  <text class="m fg" x="584" y="336" font-size="14">review blitz</text>
</svg>
