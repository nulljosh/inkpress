<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" rx="32" style="fill:#1a1a1a"/>
  <!-- Notebook body -->
  <rect x="52" y="32" width="100" height="136" rx="8" style="fill:rgba(255,255,255,0.06);stroke:rgba(255,255,255,0.12);stroke-width:1"/>
  <!-- Top edge shimmer -->
  <rect x="60" y="34" width="84" height="1" rx="0.5" style="fill:rgba(255,255,255,0.08)"/>
  <!-- Spine binding -->
  <line x1="72" y1="36" x2="72" y2="164" style="stroke:rgba(255,255,255,0.1);stroke-width:1"/>
  <!-- Binding marks -->
  <circle cx="72" cy="52" r="1.5" style="fill:rgba(255,255,255,0.15)"/>
  <circle cx="72" cy="76" r="1.5" style="fill:rgba(255,255,255,0.15)"/>
  <circle cx="72" cy="100" r="1.5" style="fill:rgba(255,255,255,0.15)"/>
  <circle cx="72" cy="124" r="1.5" style="fill:rgba(255,255,255,0.15)"/>
  <circle cx="72" cy="148" r="1.5" style="fill:rgba(255,255,255,0.15)"/>
  <!-- Writing lines -->
  <rect x="82" y="52" width="58" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.3)"/>
  <rect x="82" y="62" width="48" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.2)"/>
  <rect x="82" y="72" width="54" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.15)"/>
  <rect x="82" y="82" width="38" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.12)"/>
  <rect x="82" y="96" width="56" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.2)"/>
  <rect x="82" y="106" width="42" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.15)"/>
  <rect x="82" y="116" width="50" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.12)"/>
  <rect x="82" y="130" width="44" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.1)"/>
  <rect x="82" y="140" width="36" height="1.5" rx="0.75" style="fill:rgba(255,255,255,0.08)"/>
  <!-- Pen -->
  <line x1="138" y1="148" x2="158" y2="42" style="stroke:rgba(255,255,255,0.5);stroke-width:2;stroke-linecap:round"/>
  <line x1="158" y1="42" x2="160" y2="36" style="stroke:rgba(255,255,255,0.6);stroke-width:1.5;stroke-linecap:round"/>
  <!-- Pen clip -->
  <line x1="156" y1="50" x2="152" y2="48" style="stroke:rgba(255,255,255,0.25);stroke-width:1;stroke-linecap:round"/>
</svg>