<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <style>
    .bg { fill: #fafafa; }
    .fg { fill: #000; }
    .mut { fill: rgba(0,0,0,0.5); }
    .dim { fill: rgba(0,0,0,0.25); }
    .brd { stroke: rgba(0,0,0,0.1); }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #111; }
      .fg { fill: #e8e8e8; }
      .mut { fill: rgba(255,255,255,0.5); }
      .dim { fill: rgba(255,255,255,0.25); }
      .brd { stroke: rgba(255,255,255,0.1); }
    }
    .t { font-family: Geist, -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }
    .m { font-family: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, monospace; }
  </style>
  <rect class="bg" width="800" height="500"/>
  <rect class="brd" x="20" y="20" width="760" height="460" rx="12" ry="12" fill="none" stroke-width="1"/>

  <text class="t fg" x="48" y="90" font-size="42" font-weight="300" letter-spacing="-1">Renames and Widgets</text>
  <text class="t mut" x="48" y="126" font-size="16">Dose to Healstack . Lingo to Lexly . widget extensions everywhere</text>

  <line class="brd" x1="48" y1="152" x2="752" y2="152" stroke-width="1"/>

  <text class="m fg" x="48" y="188" font-size="14">healstack, epiphany, lexly, spark</text>
  <text class="m fg" x="48" y="210" font-size="14">talli, echo, nimble, nyc, casewright</text>
  <text class="m mut" x="48" y="236" font-size="14">(10+ repo updates, 3 renames)</text>

  <rect class="brd" x="560" y="176" width="200" height="280" rx="8" ry="8" fill="none" stroke-width="1"/>
  <text class="m mut" x="584" y="206" font-size="12">highlights</text>
  <text class="m fg" x="584" y="232" font-size="28" font-weight="500">12</text>
  <text class="m mut" x="584" y="268" font-size="12">in flight</text>
  <text class="m fg" x="584" y="292" font-size="14">healstack 2.3.4</text>
  <text class="m fg" x="584" y="314" font-size="14">epiphany 2.5.2</text>
  <text class="m fg" x="584" y="336" font-size="14">talli 3.5.3</text>
  <text class="m fg" x="584" y="358" font-size="14">nimble landing</text>
  <text class="m fg" x="584" y="378" font-size="14">inkpress 1.0.2</text>
  <text class="m mut" x="584" y="412" font-size="12">window</text>
  <text class="m fg" x="584" y="434" font-size="13">Jul 3 -- Jul 8</text>

  <text class="t mut" x="48" y="462" font-size="13">2026-07-03</text>
