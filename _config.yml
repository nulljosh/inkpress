title: nulljosh
description: "Notes, thoughts, and project updates"
url: "https://journal.heyitsmejosh.com"
author:
  name: "Joshua Trommel"
permalink: /:year/:month/:day/:slug/
markdown: kramdown
timezone: America/Vancouver
future: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

words_per_minute: 200

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CLAUDE.md
  - scripts
  - default.profraw
  - vendor
  - "*.profraw"
