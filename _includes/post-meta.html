{% assign words = content | number_of_words %}
{% assign minutes = words | divided_by: site.words_per_minute | plus: 1 %}
<p class="post-meta">
  {% if page.date %}<time datetime="{{ page.date | date: '%Y-%m-%dT%H:%M:%S%z' }}">{{ page.date | date: "%B %Y" }}</time>{% endif %}
  &middot; {{ minutes }} min
</p>
